<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Tugas Bootstrap</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-4">

    <!-- Judul -->
    <h1 class="text-center mb-4">Tugas Modul 5 - Bootstrap</h1>

    <!-- 1. Grid -->
    <h2>1. Bootstrap Grid</h2>
    <div class="row mb-4">
        <div class="col-md-4 bg-primary text-white p-3">Kolom 1</div>
        <div class="col-md-4 bg-success text-white p-3">Kolom 2</div>
        <div class="col-md-4 bg-danger text-white p-3">Kolom 3</div>
    </div>

    <!-- 2. Table -->
    <h2>2. Bootstrap Table</h2>
    <table class="table table-bordered table-striped mb-4">
        <thead class="table-dark">
            <tr>
                <th>No</th>
                <th>Nama</th>
                <th>Kelas</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>1</td>
                <td>Daffa Aryaputra</td>
                <td>IF</td>
            </tr>
            <tr>
                <td>2</td>
                <td>Budi</td>
                <td>SI</td>
            </tr>
        </tbody>
    </table>

    <!-- 3. Image -->
    <h2>3. Bootstrap Image</h2>
    <div class="text-center mb-4">
        <img src="gambar.jpg" class="img-fluid rounded" alt="gambar">
    </div>

    <!-- 4. Button -->
    <h2>4. Bootstrap Button</h2>
    <div class="mb-4">
        <button class="btn btn-primary">Primary</button>
        <button class="btn btn-success">Success</button>
        <button class="btn btn-danger">Danger</button>
    </div>

    <!-- 5. Form -->
    <h2>5. Bootstrap Form</h2>
    <form>
        <div class="mb-3">
            <label class="form-label">Nama</label>
            <input type="text" class="form-control" placeholder="Masukkan nama">
        </div>
        
        <div class="mb-3">
            <label class="form-label">Email</label>
            <input type="email" class="form-control" placeholder="Masukkan email">
        </div>

        <button type="submit" class="btn btn-primary">Submit</button>
    </form>

</div>

</body>
</html>
